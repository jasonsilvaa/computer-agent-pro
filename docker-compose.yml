services:
  cua2:
    build: .
    ports:
      - "7860:7860"
    environment:
      - DESKTOP_API_URL=http://desktop:5000
      - OLLAMA_BASE_URL=http://ollama:11434
      - VNC_URL=http://localhost:6080/vnc.html
    depends_on:
      desktop:
        condition: service_started
      ollama:
        condition: service_healthy

  desktop:
    build: ./desktop
    ports:
      - "5000:5000"
      - "6080:6080"

  ollama:
    build: ./ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 120s
    # GPU: uncomment if you have NVIDIA GPU + nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data: {}
